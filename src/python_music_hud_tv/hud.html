<html lang="en">
<body><div max-width="100%">

                </td>

                <!-- music_data.next.title music_data.next_next.duration_pretty -->
            </td></tr>

                <!-- music_data.next.artist -->
            </td></tr>
            <tr><td id="nextDanceStyleHeader" class="nextDanceStyleHeader">
                <!-- page_data.next_dance_style_header -->
            </td></tr>
            <tr><td id="nextDanceStyle" class="nextDanceStyle">
                <ul id="nextDanceStyleList" class="nextDanceStyleList">

                </ul>

        <table id="nextNextTable" class="nextNextTable">
            <tr>
                <td id="nextNextTableTD">
                    <div id="nextNextSong"><!-- page_data.next_next_header music_data.next_next.title music_data.next_next.duration_pretty music_data.next_next.comment --></div>
                </td>
            </tr>

    </div>

<script>
const UPS = 2;
const UPDATE_INTERVAL = 1000 / UPS;


//==============================================================================
class MaxQueue {
    // based upon https://charemza.name/blog/posts/javascript/async/javascript-queue-with-concurrency-limit/

    //--------------------------------------------------------------------------
    constructor(concurrency, max_tasks) {
        this.running = 0;
        this.tasks = [];
        this.concurrency = concurrency;
        this.max_tasks = max_tasks;
    }

    //--------------------------------------------------------------------------
    async enqueue(task) {
        if (this.tasks.length >= this.max_tasks) return;

        this.tasks.push(task)
        if (this.running >= this.concurrency) return;

        this.running = this.running + 1;
        while (this.tasks.length > 0) {
            try {
                let task_to_run = this.tasks.shift()
                await task_to_run();
            } catch(e) {
                console.error(e)
            }
        }
        this.running = this.running - 1;
    }

    //--------------------------------------------------------------------------
    async push(task) {
        this.enqueue(task)
    }
}

//==============================================================================
class PageData {
    //--------------------------------------------------------------------------
    constructor() {
        this.current_dance_style_header = "";
        this.next_divider = "";
        this.next_header = "";
        this.next_dance_style_header = "";
        this.next_next_header = "";
        this.real_time = "";
    }
}

//==============================================================================
const MusicHudTV = {
    "config": {},

    "timer_update": null,
    "fetch_queue": new MaxQueue(1, 4),

    "el_realTime": null,

    "el_currentTrackTitle": null,
    "el_currentArtist": null,
    "el_currentTrackTime": null,
    "el_currentDanceStyleHeader": null,
    "el_currentDanceStyle": null,

    "el_nextTitle": null,
    "el_nextArtist": null,
    "el_nextDanceStyleHeader": null,
    "el_nextDanceStyle": null,

    "el_nextNextSong": null,

    "page_data_next_divider": null,

    //-------------------------------------------------------------------------------
    "_initialize": async function() {
        MusicHudTV.el_realTime = document.getElementById("realTime");

        MusicHudTV.el_currentTrackTitle = document.getElementById("currentTrackTitle");
        MusicHudTV.el_currentTrackTime = document.getElementById("currentTrackTime");
        MusicHudTV.el_currentArtist = document.getElementById("currentArtist");
        MusicHudTV.el_currentDanceStyleHeader = document.getElementById("currentDanceStyleHeader");
        MusicHudTV.el_currentDanceStyleList = document.getElementById("currentDanceStyleList");

        MusicHudTV.el_nextTitle = document.getElementById("nextTitle");
        MusicHudTV.el_nextArtist = document.getElementById("nextArtist");
        MusicHudTV.el_nextDanceStyleHeader = document.getElementById("nextDanceStyleHeader");
        MusicHudTV.el_nextDanceStyleList = document.getElementById("nextDanceStyleList");

        MusicHudTV.el_nextNextSong = document.getElementById("nextNextSong");

        MusicHudTV.page_data_next_divider = document.getElementById("page_data_next_divider");

        response = await fetch("/config");

        if (!response.ok) {
            console.log("HTTP Error:", response.status);
            return;
        }

        data = await response.json();
        MusicHudTV.config = data["config"];

        document.documentElement.style.setProperty('--BG_COLOR', MusicHudTV.config.background_color);
        document.documentElement.style.setProperty('--FG_COLOR', MusicHudTV.config.foreground_color);

        MusicHudTV.timer_update = setInterval(
            MusicHudTV.update,
            UPDATE_INTERVAL,
        )
    },
    //------------------------------------------------------------------------------
    "commentToStyle": function(comment) {
        if (
            comment === null ||
            comment === ""
        ) {
            return "";
        }

        comment = comment.split(";")[0]

        comment = (
            comment.
                replaceAll("ECS", "East Coast Swing, Jitterbug").
                replaceAll("WCS", "West Coast Swing")
        )

        ret = "";
        if ( comment != "" ) {
            ret = "<li>" + comment.replaceAll(",", "</li><li>") + "</li>";
        }
        ret += "<li>Whatever Feels Right</li>";

        return ret;
    },
    //-------------------------------------------------------------------------------
    "update": function() {
        MusicHudTV.updateClock();

        MusicHudTV.fetch_queue.enqueue(async () => void MusicHudTV.updateData().catch(err => console.error(err)));
    },
    //-------------------------------------------------------------------------------
    "updateClock": function() {
        let now = new Date();
        let nowStr = now.toLocaleTimeString();
        MusicHudTV.el_realTime.innerHTML = nowStr;
    },
    //------------------------------------------------------------------------------
    "updateData": async function() {
        try {
            let response = await fetch("/data");

            if (!response.ok) {
                console.log("HTTP Error:", response.status);
                return;
            }

            const data = await response.json();
            data.page_data = new PageData();

            if ( MusicHudTV.config.secret_titles.includes(data.music_data.next_next.title) ) {
                data.music_data.next_next.title = "*****";
            } else if (
                [
                    data.music_data.next_next.title,
                    data.music_data.next.title,
                    data.music_data.current.title,
                ].includes(MusicHudTV.config.gap_silence_title)
            ) {
                data.music_data.next_next.title = "";
                data.music_data.next_next.duration_pretty = "";
                data.music_data.next_next.comment = "";
            }

            if ( MusicHudTV.config.secret_titles.includes(data.music_data.next.title) ) {
                data.music_data.next.title = "*****";
                data.music_data.next.artist = "*****";
            } else if (
                [
                    data.music_data.next.title,
                    data.music_data.current.title,
                ].includes(MusicHudTV.config.gap_silence_title)
            ) {
                data.music_data.next.title = "";
                data.music_data.next.artist = "";
                data.music_data.next.duration_pretty = "";
                data.music_data.next.comment = "";
            }

            if (
                data.music_data.current.title ==
                MusicHudTV.config.gap_silence_title
            ) {
                data.music_data.current.title = "";
                data.music_data.current.artist = "";
                data.music_data.current.comment = "";
            }

            if (
                [
                    MusicHudTV.config.last_call_title,
                    MusicHudTV.config.last_dance_title,
                ].includes(data.music_data.current.title)
            ) {
                data.music_data.next.title = "";
                data.music_data.next.artist = "";
                data.music_data.next.duration_pretty = "";
                data.music_data.next.comment = "";

                data.music_data.next_next.title = "";
                data.music_data.next_next.duration_pretty = "";
                data.music_data.next_next.comment = "";

                data.page_data.next_dance_style_header = "";
                data.page_data.next_header = "";
                data.page_data.next_next_header = "";
                data.page_data.next_divider = "<hr>";
            }

            data.music_data.current.comment = MusicHudTV.commentToStyle(
                data.music_data.current.comment
            );

            if (
                data.music_data.current.title !== null &&
                data.music_data.current.title != ""
            ) {
                data.page_data.current_dance_style_header = "Dance Style Info:";
            } else {
                data.music_data.current_play_head_time_and_length_pretty = "";
            }

            if (
                data.music_data.next.title !== null &&
                data.music_data.next.title != ""
            ) {
                data.music_data.next.comment = MusicHudTV.commentToStyle(
                    data.music_data.next.comment
                );

                data.page_data.next_divider = "<hr>";
                data.page_data.next_header = "Next Up:";
                data.page_data.next_dance_style_header = "Dance Style Info:";

                if (
                    data.music_data.next.title ==
                    MusicHudTV.config.last_dance_title
                ) {
                    data.page_data.next_header = "LAST DANCE:";
                }

                if (
                    data.music_data.next.artist !== null &&
                    data.music_data.next.artist != ""
                ) {
                    data.music_data.next.artist = (
                        "by" +
                        data.music_data.next.artist
                    );
                }
            }

            if ((
                data.music_data.next_next.title !== null &&
                data.music_data.next_next.title != ""
            )) {
                data.music_data.next_next.comment = MusicHudTV.commentToStyle(
                    data.music_data.next_next.comment
                );

                data.page_data.next_next_header = "Followed by:<br/>";
            }

            if (
                data.music_data.current.title == MusicHudTV.config.last_call_title
            ) {
                data.music_data.next.title = (
                    "<div class=\"bigTitle\">LAST CALL FOR ALCOHOL!</div>"
                );
            } else if (
                data.music_data.current.title == MusicHudTV.config.last_dance_title
            ) {
                data.music_data.next.title = (
                    "<div class=\"bigTitle\">THANK YOU FOR COMING!</div>"
                );
            }

            current_playlist_name = data.music_data.current_playlist_name;
            if (
                data.music_data.current.title === null ||
                data.music_data.current.title == "" ||
                MusicHudTV.config.display_songs_for_playlists.includes(current_playlist_name) == false
            ) {
                data.music_data.next_next.title = data.music_data.next.title;

                if (
                    data.music_data.next_next.title === null ||
                    data.music_data.next_next.title == ""
                ) {
                    data.music_data.next_next.title = "";
                } else {
                    data.music_data.next_next.title = (
                        "Next: " + data.music_data.next_next.title
                    );
                }

                data.music_data.next.title = data.music_data.current.title;

                if (
                    data.music_data.next.title !== null &&
                    data.music_data.next.title != ""
                ) {
                    data.music_data.next.title = (
                        "<br/><br/><br/><br/><br/><br/><br/>Currently Playing:" +
                        data.music_data.next.title + '<br/>' +
                        data.music_data.next_next.title
                    );
                } else {
                    data.music_data.next.title = "";
                }
                data.music_data.next_next.title = "";

                data.music_data.current.title = (
                    '<div class="bigTitle"><br/>' + MusicHudTV.config.event_title_html + '</div>'
                );

                data.music_data.current.artist = "";
                data.music_data.current.comment = "";

                data.music_data.current_play_head_time_and_length_pretty = "";

                data.music_data.next.artist = "";
                data.music_data.next.duration_pretty = "";
                data.music_data.next.comment = "";

                data.music_data.next_next.title = "";
                data.music_data.next_next.duration_pretty = "";
                data.music_data.next_next.comment = "";

                data.page_data.current_dance_style_header = "";
                data.page_data.next_dance_style_header = "";
                data.page_data.next_divider = "";
                data.page_data.next_header = "";
                data.page_data.next_next_header = "";
            } else {
                data.music_data.current.title = (
                    '<div class="title">' +
                    data.music_data.current.title +
                    "</div>"
                );
            }

            if (
                data.music_data.current.artist !== null &&
                data.music_data.current.artist != ""
            ) {
                data.music_data.current.artist = (
                    'by' + data.music_data.current.artist
                );
            }

            MusicHudTV.el_currentTrackTitle.innerHTML = data.music_data.current.title;
            MusicHudTV.el_currentTrackTime.innerHTML = data.music_data.current_play_head_time_and_length_pretty;
            MusicHudTV.el_currentArtist.innerHTML = data.music_data.current.artist;
            MusicHudTV.el_currentDanceStyleHeader.innerHTML = data.page_data.current_dance_style_header;
            MusicHudTV.el_currentDanceStyleList.innerHTML = data.music_data.current.comment;

            MusicHudTV.el_nextTitle.innerHTML = data.music_data.next.title + " " + data.music_data.next_next.duration_pretty;
            MusicHudTV.el_nextArtist.innerHTML = data.music_data.next.artist;
            MusicHudTV.el_nextDanceStyleHeader.innerHTML = data.page_data.next_dance_style_header;
            MusicHudTV.el_nextDanceStyleList.innerHTML = data.music_data.next.comment;

            MusicHudTV.el_nextNextSong.innerHTML = data.page_data.next_next_header + " " + data.music_data.next_next.title + " " + data.music_data.next_next.duration_pretty + " <ul>" + data.music_data.next_next.comment + "</ul>";

            MusicHudTV.page_data_next_divider.innerHTML = data.page_data.next_divider;
        } catch (error) {
            console.log(
                "an error was thrown:\n" +
                error + "\n" +
                "name: '" + error.name + "'\n" +
                "message: '" + error.message + "'\n'" +
                "stack: '" + error.stack + "'"
            );

//(index):237  GET http://127.0.0.1:8080/data net::ERR_INSUFFICIENT_RESOURCES
//updateData @ (index):237
//update @ (index):226
//(index):259 an error was thrown:
//TypeError: Failed to fetch
//name: 'TypeError'
//message: 'Failed to fetch'
//'stack: 'TypeError: Failed to fetch
//    at Object.updateData ((index):237:34)
//    at :8080/update (http://127.0.0.1:8080/:226:25)'

            clearInterval(MusicHudTV.timer_update);
        }
    },
}

MusicHudTV._initialize();

</script>

</html>
