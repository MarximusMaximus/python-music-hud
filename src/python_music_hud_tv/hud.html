<!DOCTYPE html>
<!-- NOTE: Throughout file we need to use double curly braces in place of singles  -->
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<style>

    }

    body {
        font-family: Big Caslon, -system, -system-font, Arial;

        color: var(--FG_COLOR);
        overflow: hidden;
    }

    body table {
        margin: 0;
        margin-left: 1%;
        margin-right: 1%;
    }

    ul {
        -webkit-column-count: 2;
        column-count: 2;
        margin: 0;
        margin-left: 0.5em;
    }

    li {
        margin-left: 0.5em;
    }

    hr {
        border: 1px;
        border-style: solid;
        margin-top: 20px;
        margin-bottom: 20px;
    }

    .title_card, .multi_song_display {
        position: absolute;
        top: 0;
        left: 0;
        margin: 8px;
        width: calc(100% - 16px);
    }

    .bottom {
        position: absolute;
        top: 600px;
        width: calc(100% - 16px);
    }
    .next_next_song {
        position: absolute;
        top: 646px;
        left: 1000px;
        width: 800px;
    }

    .title_card_song_info {
        position: absolute;
        top: 350px;
        width: 98%;
    }

    .currentTitle,
    .title_card_title_container {
        font-size: 4vw;
    }
    .currentTitle div.currentTrackTitle,
    .title_card_title_text_container {
        width: 68%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .currentTitle div.currentTrackTime {
        position: absolute;
        top: 1%;
        right: 1%;
    }
    .currentArtistOuter {
        font-size: 2vw;
        color: color-mix(in srgb, var(--FG_COLOR) 80%, transparent);
    }
    .currentDanceStyleHeader {
        font-size: 2vw;
        color: color-mix(in srgb, var(--FG_COLOR) 80%, transparent);
    }
    .currentDanceStyle {
        font-size: 4.2vw;
    }

    table.nextTable {
        color: color-mix(in srgb, var(--FG_COLOR) 70%, transparent);
    }

    table.nextNextTable {
        font-size: 1.5vw;
        color: color-mix(in srgb, var(--FG_COLOR) 70%, transparent);
    }

    .nextHeader {
        font-size: 2.5vw;
    }
    .nextTitle {
        font-size: 2vw;
    }
    .nextArtistOuter {
        font-size: 1.5vw;
    }
    .nextDanceStyleHeader {
        font-size: 1.5vw;
    }
    .nextDanceStyle {
        font-size: 2vw;
    }

    div.realTime {
        position: absolute;
        bottom: 1%;
        right: 1%;
        font-size: 4vw;
        color: color-mix(in srgb, var(--FG_COLOR) 40%, transparent);
    }

    div.bigTitle {
        font-size: 7.5vw;
        text-align: center;
        width: 100%;
    }
</style>
</head>
<html lang="en">
<body><div max-width="100%">
    <div id="title_card" class="title_card" style="display: none;">
        <table width="98%">
            <tr><td id="title_card_title_container" class="TitleCardTitleContainer">
                <div id="title_card_title_text_container" class="TitleCardTitleTextContainer">
                    <div class="bigTitle">
                        <span id="title_card_title_text">
                            <!-- MusicHudTV.config.event_title_html -->
                        </span>
                    </div>
                </div>
            </td></tr>
        </table>
        <div id="bottom" class="bottom">
            <div id="title_card_song_info" class="title_card_song_info">
                <table class="nextTable">
                    <tr><td class="nextTitle">
                        <span id="title_card_song_info_current"><!-- data.music_data.next.title --></span>
                        <br/>
                        <span id="title_card_song_info_next"><!-- data.music_data.next_next.title --></span>
                    </td></tr>
                </table>
            </div>
        </div>
    </div>
    <div id="multi_song_display" class="multi_song_display">
        <div id="current_song" style="display: none;">
            <table width="98%">
                <tr><td id="currentTitle" class="currentTitle">
                    <div id="currentTrackTime" class="currentTrackTime"><!-- music_data.current_play_head_time_and_length_pretty --></div>
                    <div id="currentTrackTitle" class="currentTrackTitle">
                        <!-- music_data.current.title -->
                    </div>
                </td></tr>
            </table>
            <table width="98%">
                <tr><td id="currentArtistOuter" class="currentArtistOuter">
                    by <span id="currentArtist"><!-- music_data.current.artist --></span>
                </td></tr>
                <tr><td id="currentDanceStyleHeader" class="currentDanceStyleHeader">
                    Dance Style Info:
                </td></tr>
                <tr><td id="currentDanceStyle" class="currentDanceStyle">
                    <ul id="currentDanceStyleList" class="currentDanceStyleList">
                        <!-- music_data.current.comment -->
                    </ul>
                </td></tr>
            </table>
        </div>
        <div id="bottom" class="bottom">
            <div id="lower_third_divider" style="display: none;">
                <hr/>
            </div>
            <div id="lower_third_message" style="display: none;">
                <div class="bigTitle">
                    <span id="lower_third_message_text"></span>
                </div>
            </div>
            <div id="next_song" style="display: none;">
                <table id="nextTable" class="nextTable">
                    <tr>
                        <td id="nextHeader" class="nextHeader">
                            <!-- next_header -->
                        </td>
                    </tr>
                    <tr><td id="nextTitle" class="nextTitle">
                        <!-- music_data.next.title music_data.next_next.duration_pretty -->
                    </td></tr>
                    <tr><td id="nextArtistOuter" class="nextArtistOuter">
                        by <span id="nextArtist"><!-- music_data.next.artist --></span>
                    </td></tr>
                    <tr><td id="nextDanceStyleHeader" class="nextDanceStyleHeader">
                        Dance Style Info:
                    </td></tr>
                    <tr><td id="nextDanceStyle" class="nextDanceStyle">
                        <ul id="nextDanceStyleList" class="nextDanceStyleList">
                            <!-- music_data.next.comment -->
                        </ul>
                    </td></tr>
                </table>
            </div>
        </div>
        <div id="next_next_song" class="next_next_song" style="display: none;">
            <table id="nextNextTable" class="nextNextTable">
                <tr>
                    <td>
                        <div id="nextNextSongTextOuter">
                            Followed by:<br/>
                            <span id="nextNextSongText">
                                <!-- music_data.next_next.title music_data.next_next.duration_pretty music_data.next_next.comment -->
                            </span>
                        </div>
                    </td>
                </tr>
            </table>
        </div>
    </div>
    <div id="realTime" class="realTime"></div>
</div></body>

<script>
"use strict";
//==============================================================================
class MaxQueue {
    // based upon https://charemza.name/blog/posts/javascript/async/javascript-queue-with-concurrency-limit/

    //--------------------------------------------------------------------------
    constructor(concurrency, max_tasks) {
        this.running = 0;
        this.tasks = [];
        this.concurrency = concurrency;
        this.max_tasks = max_tasks;
    }

    //--------------------------------------------------------------------------
    async enqueue(task) {
        if (this.tasks.length >= this.max_tasks) return;

        this.tasks.push(task)
        if (this.running >= this.concurrency) return;

        this.running = this.running + 1;
        while (this.tasks.length > 0) {
            try {
                let task_to_run = this.tasks.shift()
                await task_to_run();
            } catch(e) {
                console.error(e)
            }
        }
        this.running = this.running - 1;
    }

    //--------------------------------------------------------------------------
    async push(task) {
        this.enqueue(task)
    }
}

//==============================================================================
class MusicHudTV {

    //--------------------------------------------------------------------------
    constructor() {
        if (
            MusicHudTV._instance !== null &&
            MusicHudTV._instance !== undefined
        )
        {
            return MusicHudTV._instance;
        }
        MusicHudTV._instance = this;

        this.config = {};

        this.timer_update = null;
        this.fetch_queue = new MaxQueue(1, 4);

        this.el_realTime = document.getElementById("realTime");

        this.el_title_card = document.getElementById("title_card")
        this.el_title_card_title_text = document.getElementById("title_card_title_text");
        this.el_title_card_song_info_current = document.getElementById("title_card_song_info_current");
        this.el_title_card_song_info_next = document.getElementById("title_card_song_info_next");

        this.el_current_song = document.getElementById("current_song");
        this.el_currentTrackTitle = document.getElementById("currentTrackTitle");
        this.el_currentTrackTime = document.getElementById("currentTrackTime");
        this.el_currentArtist = document.getElementById("currentArtist");
        this.el_currentDanceStyleHeader = document.getElementById("currentDanceStyleHeader");
        this.el_currentDanceStyleList = document.getElementById("currentDanceStyleList");

        this.el_next_song = document.getElementById("next_song");
        this.el_nextHeader = document.getElementById("nextHeader");
        this.el_nextTitle = document.getElementById("nextTitle");
        this.el_nextArtist = document.getElementById("nextArtist");
        this.el_nextDanceStyleHeader = document.getElementById("nextDanceStyleHeader");
        this.el_nextDanceStyleList = document.getElementById("nextDanceStyleList");

        this.el_next_next_song = document.getElementById("next_next_song");
        this.el_nextNextSongText = document.getElementById("nextNextSongText");

        this.el_lower_third_divider = document.getElementById("lower_third_divider");
        this.el_lower_third_message = document.getElementById("lower_third_message");
        this.el_lower_third_message_text = document.getElementById("lower_third_message_text");
    }

    //-------------------------------------------------------------------------------
    async start() {
        let response = await fetch("/config");

        if (!response.ok) {
            console.log("HTTP Error:", response.status);
            return;
        }

        let data = await response.json();
        this.config = data["config"];

        document.documentElement.style.setProperty('--BG_COLOR', this.config.background_color);
        document.documentElement.style.setProperty('--FG_COLOR', this.config.foreground_color);

        let update_interval = 1000 / this.config.updates_per_second;

        this.timer_update = setInterval(
            this.update,
            update_interval,
            this,
        )
    }

    //-------------------------------------------------------------------------------
    update(real_this) {
        // NOTE: b/c this function is called via setInterval, 'this' object is
        //       the window, so we pass in the real_this which is our object

        real_this.updateClock();

        real_this.fetch_queue.enqueue(async () => void real_this.updateData().catch(err => console.error(err)));
    }

    //------------------------------------------------------------------------------
    commentToStyle(comment) {
        if (
            comment === null ||
            comment === ""
        ) {
            return "";
        }

        comment = comment.split(";")[0]

        comment = (
            comment.
                replaceAll("ECS", "East Coast Swing, Jitterbug").
                replaceAll("WCS", "West Coast Swing")
        )

        let ret = "";
        if ( comment != "" ) {
            ret = "<li>" + comment.replaceAll(",", "</li><li>") + "</li>";
        }
        ret += "<li>Whatever Feels Right</li>";

        return ret;
    }

    //-------------------------------------------------------------------------------
    durationInSecondsToPretty(duration_in_seconds) {
        duration_in_seconds = Math.floor(duration_in_seconds);

        let minutes = Math.floor(duration_in_seconds / 60);
        let seconds = Math.floor(duration_in_seconds % 60);

        let pretty_array = [];

        let minutes_str = minutes.toString();
        pretty_array.push(minutes_str);

        let seconds_str = seconds.toString();
        if ( seconds < 10 ) {
            seconds_str = "0" + seconds_str;
        }
        pretty_array.push(seconds_str);

        let pretty_str = pretty_array.join(":");

        return pretty_str;
    }

    //-------------------------------------------------------------------------------
    updateClock() {
        let now = new Date();
        let nowStr = now.toLocaleTimeString();
        this.el_realTime.innerHTML = nowStr;
    }

    //------------------------------------------------------------------------------
    async updateData() {
        try {
            let response = await fetch("/data");

            if (!response.ok) {
                console.log("HTTP Error:", response.status);
                return;
            }

            const data = await response.json();

            let hide_title_card = true;
            let hide_lower_third_message = true;
            let hide_next_song = false;
            let hide_next_next_song = false;

            let next_header = "";

            let lower_third_message_text = "";

            let current_play_head_time_and_length_pretty = "";
            let next_duration_pretty = "";
            let next_next_duration_pretty = "";

            // NOTE: sections are set up in reverse order b/c of setting
            //       whether they are displayed or not

            //..................................................................
            //region next_next
            if (
                data.music_data.next_next.title !== null &&
                data.music_data.next_next.title != ""
            )
            {
                if ( this.config.secret_titles.includes(
                    data.music_data.next_next.title
                ) ) {
                    data.music_data.next_next.title = "*****";
                    data.music_data.next_next.artist = "*****";
                } else if (
                    data.music_data.next_next.title ==
                    this.config.gap_silence_title
                ) {
                    data.music_data.next_next.title= "";
                    hide_next_next_song = true;
                }

                next_next_duration_pretty = this.durationInSecondsToPretty(
                    data.music_data.next_next.duration_in_seconds
                );
            } else {
                data.music_data.next_next.title = "";
                hide_next_next_song = true;
            }
            data.music_data.next_next.comment = this.commentToStyle(
                data.music_data.next_next.comment
            )
            //endregion next_next
            //..................................................................

            //..................................................................
            //region next
            if (
                data.music_data.next.title !== null &&
                data.music_data.next.title != ""
            )
            {
                if (
                    data.music_data.next.title ==
                        this.config.gap_silence_title
                ) {
                    data.music_data.next.title = "";
                    hide_next_song = true;
                    data.music_data.next_next.title= "";
                    high_next_next_song = true;
                } else if ( this.config.secret_titles.includes(
                    data.music_data.next.title
                ) ) {
                    data.music_data.next.title = "*****";
                    data.music_data.next.artist = "*****";
                }

                next_header = "Next Up:";
                if (
                    data.music_data.next.title ==
                    this.config.last_dance_title
                ) {
                    next_header = "LAST DANCE:";
                }

                next_duration_pretty = this.durationInSecondsToPretty(
                    data.music_data.next.duration_in_seconds
                );
            } else {
                data.music_data.next.title = "";
                hide_next_song = true;
            }
            data.music_data.next.comment = this.commentToStyle(
                data.music_data.next.comment
            )
            //endregion next
            //..................................................................

            //..................................................................
            //region current
            if (
                data.music_data.current.title !== null &&
                data.music_data.current.title != ""
            )
            {
                if (
                    data.music_data.current.title ==
                        this.config.gap_silence_title
                ) {
                    hide_title_card = false;
                    data.music_data.current.title = ""
                    hide_lower_third_message = true;
                    data.music_data.next.title = "";
                    hide_next_song = true;
                    data.music_data.next_next.title= "";
                    hide_next_next_song = true;
                } else if (
                    Object.keys(
                        this.config.lower_third_message_songs
                    ).
                        includes(
                            data.music_data.current.title
                        )
                ) {
                    lower_third_message_text =
                        this.config.lower_third_message_songs[
                            data.music_data.current.title
                        ]
                    hide_lower_third_message = false;
                    hide_next_song = true;
                    hide_next_next_song = true;
                }

                let offset_in_seconds = Math.round(
                    (
                        Math.floor(Date.now()) -
                        data.music_data.current_wall_unix_timestamp_ms
                    ) / 1000
                );
                //offset_in_seconds = 0;
                let current_play_head_time = (
                    data.music_data.current_play_head_time_in_seconds +
                    offset_in_seconds
                )
                let current_play_head_time_pretty =
                    this.durationInSecondsToPretty(current_play_head_time);
                let current_play_head_length_pretty =
                    this.durationInSecondsToPretty(
                        data.music_data.current.duration_in_seconds
                    );
                current_play_head_time_and_length_pretty = (
                    current_play_head_time_pretty +
                    " / " +
                    current_play_head_length_pretty
                );
            } else {
                data.music_data.current.title = ""
            }
            data.music_data.current.comment = this.commentToStyle(
                data.music_data.current.comment
            )
            //region current
            //..................................................................

            //..................................................................
            //region title card
            if (
                this.config.display_songs_for_playlists.includes(
                    data.music_data.current_playlist_name
                ) == false ||
                data.music_data.current.title === ""
            ) {
                hide_title_card = false;
                hide_lower_third_message = true;
                hide_next_song = true;
                hide_next_next_song = true;

                if (
                    data.music_data.current.title !== null &&
                    data.music_data.current.title != ""
                ) {
                    data.music_data.current.title = (
                        "Currently Playing: " +
                        data.music_data.current.title
                    );
                }

                if (
                    data.music_data.next.title !== null &&
                    data.music_data.next.title != ""
                ) {
                    data.music_data.next.title = (
                        "Next: " +
                        data.music_data.next.title
                    );
                }
            }
            //endregion title card
            //..................................................................

            //..................................................................
            //region display
            if ( hide_title_card ) {
                this.el_title_card.style.setProperty("display", "none");
                this.el_lower_third_divider.style.setProperty("display", "block");
                this.el_current_song.style.setProperty("display", "block");
            } else {
                this.el_title_card.style.setProperty("display", "block");
                this.el_lower_third_divider.style.setProperty("display", "none");
                this.el_current_song.style.setProperty("display", "none");
            }

            if ( hide_lower_third_message ) {
                this.el_lower_third_message.style.setProperty("display", "none");
            } else {
                this.el_lower_third_message.style.setProperty("display", "block");
            }

            if ( hide_next_song ) {
                this.el_next_song.style.setProperty("display", "none");
            } else {
                this.el_next_song.style.setProperty("display", "block");
            }

            if ( hide_next_next_song ) {
                this.el_next_next_song.style.setProperty("display", "none");
            } else {
                this.el_next_next_song.style.setProperty("display", "block");
            }
            //endregion display
            //..................................................................

            //..................................................................
            //region text
            this.el_title_card_title_text.innerHTML = this.config.event_title_html;
            this.el_title_card_song_info_current.innerHTML = data.music_data.current.title;
            this.el_title_card_song_info_next.innerHTML = data.music_data.next.title;

            this.el_currentTrackTitle.innerHTML = data.music_data.current.title;
            this.el_currentTrackTime.innerHTML = current_play_head_time_and_length_pretty;
            this.el_currentArtist.innerHTML = data.music_data.current.artist;
            this.el_currentDanceStyleList.innerHTML = data.music_data.current.comment;

            this.el_nextHeader.innerHTML = next_header;
            this.el_nextTitle.innerHTML = data.music_data.next.title + " - " + next_duration_pretty;
            this.el_nextArtist.innerHTML = data.music_data.next.artist;
            this.el_nextDanceStyleList.innerHTML = data.music_data.next.comment;

            this.el_nextNextSongText.innerHTML = data.music_data.next_next.title + " - " + next_next_duration_pretty + " <ul>" + data.music_data.next_next.comment + "</ul>";

            this.el_lower_third_message_text.innerHTML = lower_third_message_text;
            //endregion text
            //..................................................................
        } catch (error) {
            console.log(
                "an error was thrown:\n" +
                error + "\n" +
                "name: '" + error.name + "'\n" +
                "message: '" + error.message + "'\n'" +
                "stack: '" + error.stack + "'"
            );

            clearInterval(this.timer_update);
        }
    }
}

let myMusicHudTV = new MusicHudTV()
myMusicHudTV.start();

</script>

</html>
