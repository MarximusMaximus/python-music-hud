<!DOCTYPE html>
<!-- NOTE: Throughout file we need to use double curly braces in place of singles  -->
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
<style>
    html {
        --BG_COLOR: white;
        --FG_COLOR: black;
    }

    body {
        font-family: Big Caslon, -system, -system-font, Arial;
        background-color: var(--BG_COLOR);
        color: var(--FG_COLOR);
        overflow: hidden;
    }

    body table {
        margin: 0;
        margin-left: 1%;
        margin-right: 1%;
    }

    ul {
        -webkit-column-count: 2;
        column-count: 2;
        margin: 0;
        margin-left: 0.5em;
    }

    li {
        margin-left: 0.5em;
    }

    hr {
        border: 1px;
        border-style: solid;
        margin-top: 20px;
        margin-bottom: 20px;
    }

    .title_card, .multi_song_display {
        position: absolute;
        top: 0;
        left: 0;
        margin: 8px;
        width: calc(100% - 16px);
    }

    .bottom {
        position: absolute;
        top: 600px;
        width: calc(100% - 16px);
    }
    .next_next_song {
        position: absolute;
        top: 646px;
        left: 1000px;
        width: 800px;
    }

    .title_card_song_info {
        position: absolute;
        top: 350px;
        width: 98%;
    }

    .currentTitle,
    .title_card_title_container {
        font-size: 4vw;
    }
    .currentTitle div.currentTrackTitle,
    .title_card_title_text_container {
        width: 68%;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .currentTitle div.currentTrackTime {
        position: absolute;
        top: 1%;
        right: 1%;
    }
    .currentArtistOuter {
        font-size: 2vw;
        color: color-mix(in srgb, var(--FG_COLOR) 80%, transparent);
    }
    .currentDanceStyleHeader {
        font-size: 2vw;
        color: color-mix(in srgb, var(--FG_COLOR) 80%, transparent);
    }
    .currentDanceStyle {
        font-size: 4.2vw;
    }

    table.nextTable {
        color: color-mix(in srgb, var(--FG_COLOR) 70%, transparent);
    }

    table.nextNextTable {
        font-size: 1.5vw;
        color: color-mix(in srgb, var(--FG_COLOR) 70%, transparent);
    }

    .nextHeader {
        font-size: 2.5vw;
    }
    .nextTitle {
        font-size: 2vw;
    }
    .nextArtistOuter {
        font-size: 1.5vw;
    }
    .nextDanceStyleHeader {
        font-size: 1.5vw;
    }
    .nextDanceStyle {
        font-size: 2vw;
    }

    div.realTime {
        position: absolute;
        bottom: 1%;
        right: 1%;
        font-size: 4vw;
        color: color-mix(in srgb, var(--FG_COLOR) 40%, transparent);
    }

    div.bigTitle {
        font-size: 7.5vw;
        text-align: center;
        width: 100%;
    }
</style>
</head>
<html lang="en">
<body><div max-width="100%">
    <div id="title_card" class="title_card" style="display: none;">
        <table width="98%">
            <tr><td id="title_card_title_container" class="TitleCardTitleContainer">
                <div id="title_card_title_text_container" class="TitleCardTitleTextContainer">
                    <div class="bigTitle">
                        <span id="title_card_title_text">
                            <!-- MusicHudTV.config.event_title_html -->
                        </span>
                    </div>
                </div>
            </td></tr>
        </table>
        <div id="bottom" class="bottom">
            <div id="title_card_song_info" class="title_card_song_info">
                <table class="nextTable">
                    <tr><td class="nextTitle">
                        <span id="title_card_song_info_current"><!-- data.music_data.next.title --></span>
                        <br/>
                        <span id="title_card_song_info_next"><!-- data.music_data.next_next.title --></span>
                    </td></tr>
                </table>
            </div>
        </div>
    </div>
    <div id="multi_song_display" class="multi_song_display">
        <div id="current_song" style="display: none;">
            <table width="98%">
                <tr><td id="currentTitle" class="currentTitle">
                    <div id="currentTrackTime" class="currentTrackTime"><!-- music_data.current_play_head_time_and_length_pretty --></div>
                    <div id="currentTrackTitle" class="currentTrackTitle">
                        <!-- music_data.current.title -->
                    </div>
                </td></tr>
            </table>
            <table width="98%">
                <tr><td id="currentArtistOuter" class="currentArtistOuter">
                    by <span id="currentArtist"><!-- music_data.current.artist --></span>
                </td></tr>
                <tr><td id="currentDanceStyleHeader" class="currentDanceStyleHeader">
                    Dance Style Info:
                </td></tr>
                <tr><td id="currentDanceStyle" class="currentDanceStyle">
                    <ul id="currentDanceStyleList" class="currentDanceStyleList">
                        <!-- music_data.current.comment -->
                    </ul>
                </td></tr>
            </table>
        </div>
        <div id="bottom" class="bottom">
            <div id="lower_third_divider" style="display: none;">
                <hr/>
            </div>
            <div id="lower_third_message" style="display: none;">
                <div class="bigTitle">
                    <span id="lower_third_message_text"></span>
                </div>
            </div>
            <div id="next_song" style="display: none;">
                <table id="nextTable" class="nextTable">
                    <tr>
                        <td id="nextHeader" class="nextHeader">
                            <!-- next_header -->
                        </td>
                    </tr>
                    <tr><td id="nextTitle" class="nextTitle">
                        <!-- music_data.next.title music_data.next_next.duration_pretty -->
                    </td></tr>
                    <tr><td id="nextArtistOuter" class="nextArtistOuter">
                        by <span id="nextArtist"><!-- music_data.next.artist --></span>
                    </td></tr>
                    <tr><td id="nextDanceStyleHeader" class="nextDanceStyleHeader">
                        Dance Style Info:
                    </td></tr>
                    <tr><td id="nextDanceStyle" class="nextDanceStyle">
                        <ul id="nextDanceStyleList" class="nextDanceStyleList">
                            <!-- music_data.next.comment -->
                        </ul>
                    </td></tr>
                </table>
            </div>
        </div>
        <div id="next_next_song" class="next_next_song" style="display: none;">
            <table id="nextNextTable" class="nextNextTable">
                <tr>
                    <td>
                        <div id="nextNextSongTextOuter">
                            Followed by:<br/>
                            <span id="nextNextSongText">
                                <!-- music_data.next_next.title music_data.next_next.duration_pretty music_data.next_next.comment -->
                            </span>
                        </div>
                    </td>
                </tr>
            </table>
        </div>
    </div>
    <div id="realTime" class="realTime"></div>
</div></body>

<script>
//==============================================================================
class MaxQueue {
    // based upon https://charemza.name/blog/posts/javascript/async/javascript-queue-with-concurrency-limit/

    //--------------------------------------------------------------------------
    constructor(concurrency, max_tasks) {
        this.running = 0;
        this.tasks = [];
        this.concurrency = concurrency;
        this.max_tasks = max_tasks;
    }

    //--------------------------------------------------------------------------
    async enqueue(task) {
        if (this.tasks.length >= this.max_tasks) return;

        this.tasks.push(task)
        if (this.running >= this.concurrency) return;

        this.running = this.running + 1;
        while (this.tasks.length > 0) {
            try {
                let task_to_run = this.tasks.shift()
                await task_to_run();
            } catch(e) {
                console.error(e)
            }
        }
        this.running = this.running - 1;
    }

    //--------------------------------------------------------------------------
    async push(task) {
        this.enqueue(task)
    }
}

//==============================================================================
const MusicHudTV = {
    "config": {},

    "timer_update": null,
    "fetch_queue": new MaxQueue(1, 4),

    "el_realTime": null,

    "el_title_card": null,
    "el_title_card_title_text": null,
    "el_title_card_song_info_current": null,
    "el_title_card_song_info_next": null,

    "el_current_song": null,
    "el_currentTrackTitle": null,
    "el_currentArtist": null,
    "el_currentTrackTime": null,
    "el_currentDanceStyleHeader": null,
    "el_currentDanceStyle": null,

    "el_next_song": null,
    "el_nextHeader": null,
    "el_nextTitle": null,
    "el_nextArtist": null,
    "el_nextDanceStyleHeader": null,
    "el_nextDanceStyle": null,

    "el_next_next_song": null,
    "el_nextNextSongText": null,

    "el_lower_third_divider": null,
    "el_lower_third_message": null,
    "el_lower_third_message_text": null,

    //-------------------------------------------------------------------------------
    "_initialize": async function() {
        MusicHudTV.el_realTime = document.getElementById("realTime");

        MusicHudTV.el_title_card = document.getElementById("title_card")
        MusicHudTV.el_title_card_title_text = document.getElementById("title_card_title_text");
        MusicHudTV.el_title_card_song_info_current = document.getElementById("title_card_song_info_current");
        MusicHudTV.el_title_card_song_info_next = document.getElementById("title_card_song_info_next");

        MusicHudTV.el_current_song = document.getElementById("current_song");
        MusicHudTV.el_currentTrackTitle = document.getElementById("currentTrackTitle");
        MusicHudTV.el_currentTrackTime = document.getElementById("currentTrackTime");
        MusicHudTV.el_currentArtist = document.getElementById("currentArtist");
        MusicHudTV.el_currentDanceStyleHeader = document.getElementById("currentDanceStyleHeader");
        MusicHudTV.el_currentDanceStyleList = document.getElementById("currentDanceStyleList");

        MusicHudTV.el_next_song = document.getElementById("next_song");
        MusicHudTV.el_nextHeader = document.getElementById("nextHeader");
        MusicHudTV.el_nextTitle = document.getElementById("nextTitle");
        MusicHudTV.el_nextArtist = document.getElementById("nextArtist");
        MusicHudTV.el_nextDanceStyleHeader = document.getElementById("nextDanceStyleHeader");
        MusicHudTV.el_nextDanceStyleList = document.getElementById("nextDanceStyleList");

        MusicHudTV.el_next_next_song = document.getElementById("next_next_song");
        MusicHudTV.el_nextNextSongText = document.getElementById("nextNextSongText");

        MusicHudTV.el_lower_third_divider = document.getElementById("lower_third_divider");
        MusicHudTV.el_lower_third_message = document.getElementById("lower_third_message");
        MusicHudTV.el_lower_third_message_text = document.getElementById("lower_third_message_text");

        response = await fetch("/config");

        if (!response.ok) {
            console.log("HTTP Error:", response.status);
            return;
        }

        data = await response.json();
        MusicHudTV.config = data["config"];

        document.documentElement.style.setProperty('--BG_COLOR', MusicHudTV.config.background_color);
        document.documentElement.style.setProperty('--FG_COLOR', MusicHudTV.config.foreground_color);

        let update_interval = 1000 / MusicHudTV.config.updates_per_second;

        MusicHudTV.timer_update = setInterval(
            MusicHudTV.update,
            update_interval,
        )
    },
    //------------------------------------------------------------------------------
    "commentToStyle": function(comment) {
        if (
            comment === null ||
            comment === ""
        ) {
            return "";
        }

        comment = comment.split(";")[0]

        comment = (
            comment.
                replaceAll("ECS", "East Coast Swing, Jitterbug").
                replaceAll("WCS", "West Coast Swing")
        )

        ret = "";
        if ( comment != "" ) {
            ret = "<li>" + comment.replaceAll(",", "</li><li>") + "</li>";
        }
        ret += "<li>Whatever Feels Right</li>";

        return ret;
    },
    //-------------------------------------------------------------------------------
    "update": function() {
        MusicHudTV.updateClock();

        MusicHudTV.fetch_queue.enqueue(async () => void MusicHudTV.updateData().catch(err => console.error(err)));
    },
    //-------------------------------------------------------------------------------
    "updateClock": function() {
        let now = new Date();
        let nowStr = now.toLocaleTimeString();
        MusicHudTV.el_realTime.innerHTML = nowStr;
    },
    //------------------------------------------------------------------------------
    "updateData": async function() {
        try {
            let response = await fetch("/data");

            if (!response.ok) {
                console.log("HTTP Error:", response.status);
                return;
            }

            const data = await response.json();

            let hide_title_card = true;
            let hide_lower_third_message = true;
            let hide_next_song = false;
            let hide_next_next_song = false;

            let next_header = "";

            let lower_third_message_text = "";

            // NOTE: sections are set up in reverse order b/c of setting
            //       whether they are displayed or not

            //..................................................................
            //region next_next
            if (
                data.music_data.next_next.title !== null &&
                data.music_data.next_next.title != ""
            )
            {
                if ( MusicHudTV.config.secret_titles.includes(
                    data.music_data.next_next.title
                ) ) {
                    data.music_data.next_next.title = "*****";
                    data.music_data.next_next.artist = "*****";
                } else if (
                    data.music_data.next_next.title ==
                    MusicHudTV.config.gap_silence_title
                ) {
                    data.music_data.next_next.title= "";
                    hide_next_next_song = true;
                }
            } else {
                data.music_data.next_next.title = "";
            }
            data.music_data.next_next.comment = MusicHudTV.commentToStyle(
                data.music_data.next_next.comment
            )
            //endregion next_next
            //..................................................................

            //..................................................................
            //region next
            if (
                data.music_data.next.title !== null &&
                data.music_data.next.title != ""
            )
            {
                if (
                    data.music_data.next.title ==
                        MusicHudTV.config.gap_silence_title
                ) {
                    data.music_data.next.title = "";
                    hide_next_song = true;
                    data.music_data.next_next.title= "";
                    high_next_next_song = true;
                } else if ( MusicHudTV.config.secret_titles.includes(
                    data.music_data.next.title
                ) ) {
                    data.music_data.next.title = "*****";
                    data.music_data.next.artist = "*****";
                }

                next_header = "Next Up:";
                if (
                    data.music_data.next.title ==
                    MusicHudTV.config.last_dance_title
                ) {
                    next_header = "LAST DANCE:";
                }
            } else {
                data.music_data.next.title = "";
            }
            data.music_data.next.comment = MusicHudTV.commentToStyle(
                data.music_data.next.comment
            )
            //endregion next
            //..................................................................

            //..................................................................
            //region current
            if (
                data.music_data.current.title !== null &&
                data.music_data.current.title != ""
            )
            {
                if (
                    data.music_data.current.title ==
                        MusicHudTV.config.gap_silence_title
                ) {
                    hide_title_card = false;
                    data.music_data.current.title = ""
                    hide_lower_third_message = true;
                    data.music_data.next.title = "";
                    hide_next_song = true;
                    data.music_data.next_next.title= "";
                    hide_next_next_song = true;
                } else if (
                    Object.keys(
                        MusicHudTV.config.lower_third_message_songs
                    ).
                        includes(
                            data.music_data.current.title
                        )
                ) {
                    lower_third_message_text =
                        MusicHudTV.config.lower_third_message_songs[
                            data.music_data.current.title
                        ]
                    hide_lower_third_message = false;
                    hide_next_song = true;
                    hide_next_next_song = true;
                }
            } else {
                data.music_data.current.title = ""
            }
            data.music_data.current.comment = MusicHudTV.commentToStyle(
                data.music_data.current.comment
            )
            //region current
            //..................................................................

            //..................................................................
            //region title card
            if (
                MusicHudTV.config.display_songs_for_playlists.includes(
                    data.music_data.current_playlist_name
                ) == false
            ) {
                hide_title_card = false;
                hide_lower_third_message = true;
                hide_next_song = true;
                hide_next_next_song = true;

                if (
                    data.music_data.current.title !== null &&
                    data.music_data.current.title != ""
                ) {
                    data.music_data.current.title = (
                        "Currently Playing: " +
                        data.music_data.current.title
                    );
                }

                if (
                    data.music_data.next.title !== null &&
                    data.music_data.next.title != ""
                ) {
                    data.music_data.next.title = (
                        "Next: " +
                        data.music_data.next.title
                    );
                }
            }
            //endregion title card
            //..................................................................

            //..................................................................
            //region display
            if ( hide_title_card ) {
                MusicHudTV.el_title_card.style.setProperty("display", "none");
                MusicHudTV.el_lower_third_divider.style.setProperty("display", "block");
                MusicHudTV.el_current_song.style.setProperty("display", "block");
            } else {
                MusicHudTV.el_title_card.style.setProperty("display", "block");
                MusicHudTV.el_lower_third_divider.style.setProperty("display", "none");
                MusicHudTV.el_current_song.style.setProperty("display", "none");
            }

            if ( hide_lower_third_message ) {
                MusicHudTV.el_lower_third_message.style.setProperty("display", "none");
            } else {
                MusicHudTV.el_lower_third_message.style.setProperty("display", "block");
            }

            if ( hide_next_song ) {
                MusicHudTV.el_next_song.style.setProperty("display", "none");
            } else {
                MusicHudTV.el_next_song.style.setProperty("display", "block");
            }

            if ( hide_next_next_song ) {
                MusicHudTV.el_next_next_song.style.setProperty("display", "none");
            } else {
                MusicHudTV.el_next_next_song.style.setProperty("display", "block");
            }
            //endregion display
            //..................................................................

            //..................................................................
            //region text
            MusicHudTV.el_title_card_title_text.innerHTML = MusicHudTV.config.event_title_html;
            MusicHudTV.el_title_card_song_info_current.innerHTML = data.music_data.current.title;
            MusicHudTV.el_title_card_song_info_next.innerHTML = data.music_data.next.title;

            MusicHudTV.el_currentTrackTitle.innerHTML = data.music_data.current.title;
            MusicHudTV.el_currentTrackTime.innerHTML = data.music_data.current_play_head_time_and_length_pretty;
            MusicHudTV.el_currentArtist.innerHTML = data.music_data.current.artist;
            MusicHudTV.el_currentDanceStyleList.innerHTML = data.music_data.current.comment;

            MusicHudTV.el_nextHeader.innerHTML = next_header;
            MusicHudTV.el_nextTitle.innerHTML = data.music_data.next.title + " - " + data.music_data.next_next.duration_pretty;
            MusicHudTV.el_nextArtist.innerHTML = data.music_data.next.artist;
            MusicHudTV.el_nextDanceStyleList.innerHTML = data.music_data.next.comment;

            MusicHudTV.el_nextNextSongText.innerHTML = data.music_data.next_next.title + " " + data.music_data.next_next.duration_pretty + " <ul>" + data.music_data.next_next.comment + "</ul>";

            MusicHudTV.el_lower_third_message_text.innerHTML = lower_third_message_text;
            //endregion text
            //..................................................................
        } catch (error) {
            console.log(
                "an error was thrown:\n" +
                error + "\n" +
                "name: '" + error.name + "'\n" +
                "message: '" + error.message + "'\n'" +
                "stack: '" + error.stack + "'"
            );

            clearInterval(MusicHudTV.timer_update);
        }
    },
}

MusicHudTV._initialize();

</script>

</html>
