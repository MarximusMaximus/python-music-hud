<!DOCTYPE html>
<html lang="en">
    <head>
        <!--<meta http-equiv="refresh" content="1" />-->
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
        <style>
            body {
                font-family: Big Caslon, -system, -system-font, Arial;
                background-color: #6E6856;
                color: rgba(29,27,22, 1);
            }

            body table {
                margin: 0;
                margin-left: 1%;
                margin-right: 1%;
            }

            ul {
                -webkit-column-count: 2;
                margin: 0;
                margin-left: 0.5em;
            }

            li {
                margin-left: 0.5em;
            }

            hr {
                border: 1px;
                border-style: solid;
                margin-top: 20px;
                margin-bottom: 20px;
            }

            .bottom {
                position: absolute;
                top: 600px;
                width: 1900px;
            }
            .bottom-right {
                position: absolute;
                top: 646px;
                left: 1000px;
                width: 800px;
            }

            .currentTitle {
                font-size: 4vw;
            }
            .currentTitle div.title {
                width: 68%;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .currentTitle div.time {
                position: absolute;
                top: 1%;
                right: 1%;
            }
            .currentArtist {
                font-size: 2vw;
                color: rgba(29,27,22, 0.8);
            }
            .currentStyleHeader {
                font-size: 2vw;
                color: rgba(29,27,22, 0.8);
            }
            .currentStyle {
                font-size: 4.2vw;
            }

            table.nextTable {
                color: rgba(29,27,22, 0.7);
            }

            table.nextNextTable {
                font-size: 1.5vw;
                color: rgba(29,27,22, 0.7);
            }

            .headerNext {
                font-size: 2.5vw;
            }
            .nextTitle {
                font-size: 2vw;
            }
            .nextArtist {
                font-size: 1.5vw;
            }
            .nextStyleHeader {
                font-size: 1.5vw;
            }
            .nextStyle {
                font-size: 2vw;
            }

            div.realTime {
                position: absolute;
                bottom: 1%;
                right: 1%;
                font-size: 4vw;
                color: rgba(29,27,22, 0.4);
            }

            div.bigTitle {
                font-size: 7.5vw;
                text-align: center;
                width: 100%;
            }
        </style>
    </head>
    <body>
        <div max-width="100%">
            <table width="98%">
                <tr><td class="currentTitle">
                    <div class="time">0:14/0:50</div>
                    <div class="title">Last Call (One Bourbon, One Scotch, and One Bee)</div>
                </td></tr>
            </table>
            <table width="98%">
                <tr><td class="currentArtist">
                    by George Thorogood
                </td></tr>
                <tr><td class="currentStyleHeader">
                    Dance Style Info:
                </td></tr>
                <tr><td class="currentStyle">
                    <ul>
                        <li>Jam</li>
                        <li>East Coast Swing</li>
                        <li>Jitterbug</li>
                        <li>Whatever Feels Right</li>
                    </ul>
                </td></tr>
            </table>
            <div class="bottom">
                <hr>
                <table class="nextTable">
                    <tr>
                        <td class="headerNext">
                        </td>
                    </tr>
                    <tr><td class="nextTitle">
                        <div class="bigTitle">LAST CALL FOR ALCOHOL!</div>
                    </td></tr>
                    <tr><td class="nextArtist">
                    </td></tr>
                    <tr><td class="nextStyleHeader">
                    </td></tr>
                    <tr><td class="nextStyle">
                        <ul>

                        </ul>
                    </td></tr>
                </table>
            </div>
            <div class="bottom-right">
                <table class="nextNextTable">
                    <tr>
                        <td>

                        </td>
                    </tr>
                </table>
            </div>
            <div class="realTime">
                12:00:32 AM
            </div>
        </div>
    </body>
</html>
